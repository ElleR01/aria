services:
  catalog-db:
    image: postgres:16
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: aria
    ports:
      - "5433:5432"
    volumes:
      - catalog_data:/var/lib/postgresql/data

  rights-db:
    image: postgres:16
    environment:
      POSTGRES_DB: rights
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: aria
    ports:
      - "5434:5432"
    volumes:
      - rights_data:/var/lib/postgresql/data

  royalties-db:
    image: postgres:16
    environment:
      POSTGRES_DB: royalties
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: aria
    ports:
      - "5435:5432"
    volumes:
      - royalties_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  catalog-service:
    image: lollo4216177/aria-catalog-service:latest
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://catalog-db:5432/catalog
      SPRING_DATASOURCE_USERNAME: aria
      SPRING_DATASOURCE_PASSWORD: aria

      ARIA_MINIO_URL: http://minio:9000
      ARIA_MINIO_ACCESS_KEY: minio
      ARIA_MINIO_SECRET_KEY: minio12345
      ARIA_MINIO_BUCKET: aria-audio
      ARIA_RIGHTS_URL: http://rights-service:8082
      ARIA_ROYALTIES_BASEURL: http://royalties-service:8083
    depends_on:
      - catalog-db
      - minio

  rights-service:
    image: lollo4216177/aria-rights-service:latest
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://rights-db:5432/rights
      SPRING_DATASOURCE_USERNAME: aria
      SPRING_DATASOURCE_PASSWORD: aria
    depends_on:
      - rights-db

  royalties-service:
    image: lollo4216177/aria-royalties-service:latest
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://royalties-db:5432/royalties
      SPRING_DATASOURCE_USERNAME: aria
      SPRING_DATASOURCE_PASSWORD: aria
    depends_on:
      - royalties-db

volumes:
  catalog_data:
  rights_data:
  royalties_data:
  minio_data:
